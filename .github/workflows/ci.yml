name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            any::AnnotationDbi
            any::bslib
            any::digest
            any::DT
            any::ggplot2
            any::htmltools
            any::jsonlite
            any::Matrix
            any::org.Mm.eg.db
            any::plotly
            any::rsconnect
            any::SeuratObject
            any::shiny
            any::testthat

      - uses: taiki-e/install-action@just

      - name: Run tests
        run: just test
